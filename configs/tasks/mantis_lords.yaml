# Task: Mantis Lords (multi-entity: simultaneous bosses). Exercises the entity
# list + attention path (PRD §3.1, Phase 4/5). Maps to hkrl.utils.config.TaskConfig.
task_id: mantis_lords
scene: GG_Mantis_Lords
difficulty: attuned
time_limit_seconds: 180

player:
  hp: max
  soul: 66
  charms: default

reward:
  boss_damage: 1.0
  player_damage: -8.0
  soul_gained: 0.5
  heal_amount: 2.0
  boss_kill: 100.0
  player_death: -100.0
  time_penalty: -0.001
  invalid_action: -0.01

observation:
  max_entities: 64        # multiple lords + projectiles
  include_fsm_state: true
  include_hitbox: true
  tier: privileged

action:
  action_repeat: 2
  enable_macro_actions: true
