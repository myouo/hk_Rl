# Remote learner config (PRD Phase 6, docs/distributed_training.md). Local
# inference on workers; APPO on the GPU learner with policy_version staleness
# handling.
defaults:
  - ./ppo_attention_gru.yaml

algorithm: appo

# Learner / distributed settings consumed by hkrl.learner / hkrl.coordinator.
learner:
  bind: 127.0.0.1:5600
  max_staleness: 4              # drop rollouts older than this many versions
  checkpoint_dir: checkpoints/
  publish_every_updates: 10

coordinator:
  bind: 127.0.0.1:5610
  num_workers: 4

# Security (PRD §9.10): LAN/localhost only; token auth; hash-verified checkpoints.
security:
  bind_scope: lan              # lan | localhost; LAN runs must use an explicit private IP bind
  require_token: true
  auth_token_env: HKRL_AUTH_TOKEN
