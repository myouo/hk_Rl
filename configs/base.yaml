# Base defaults shared by train configs. Compose via a `defaults:` key
# (config loader composition lands in phase 2; see hkrl/utils/config.py).
# Fields map to hkrl.utils.config.TrainConfig.

algorithm: recurrent_ppo
gamma: 0.995
gae_lambda: 0.95
clip_range: 0.2
learning_rate: 3.0e-4
rollout_steps: 2048
minibatch_size: 256
epochs: 4
sequence_length: 32
burn_in: 0
entropy_coef: 0.01
value_coef: 0.5
max_grad_norm: 0.5
seed: 0

transport:
  name: tcp        # tcp for live HKRLEnvMod; shm requires HKRL_ENABLE_INPROCESS_SHM=1 prototype opt-in
  host: 127.0.0.1
  port: 5555
  shm_name: hkrl_env
  req_slots: 8
  resp_slots: 8

model:
  name: entity_attention_gru
  entity_hidden: 128
  attention_layers: 2
  attention_heads: 4
  rnn_type: gru    # gru | lstm | none
  rnn_hidden: 256
