name: hkrl
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - "python=3.10"
  - "pip>=24"
  - "setuptools>=68"
  - "wheel"

  # Runtime dependencies from python/pyproject.toml.
  - "numpy>=1.24"
  - "gymnasium>=0.29"
  - "pydantic>=2.5"
  - "pyyaml>=6.0"
  - "python-flatbuffers>=24.3.25"
  - "flatbuffers>=24.3.25"
  - "pytorch>=2.2"
  - "cpuonly"

  # Dev dependencies from python[dev].
  - "ruff>=0.4"
  - "mypy>=1.9"
  - "pytest>=8.0"
  - "pytest-cov>=5.0"

  # Optional extras used by worker/learner logging and distributed plumbing.
  - "tensorboard>=2.16"
  - "wandb>=0.16"
  - "pyzmq>=25.1"

  - pip:
      - "-e ./python[dev,logging,distributed]"
