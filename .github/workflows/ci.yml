name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          environment-file: environment.yml
          activate-environment: hkrl
          auto-activate: false
          mamba-version: "*"
          use-mamba: true

      - name: Show environment
        run: |
          conda info
          python -V
          python -c "import hkrl; print(f'hkrl schema_version={hkrl.SCHEMA_VERSION}')"

      - name: Run quality gate
        run: make check
